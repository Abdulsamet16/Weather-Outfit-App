<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Outfit App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

 <div class="container">
  <div class="app-header">
    <div class="weather-icon-wrap">🌦️</div>
    <h1>Weather App</h1>
    <p class="subtitle">Real-time weather at your fingertips</p>
  </div>

  <div class="input-wrap">
    <span class="input-icon">🔍</span>
    <input type="text" id="cityInput" placeholder="Search city...">
  </div>

  <div class="button-group">
    <button class="btn-primary" onclick="getWeather()">Search Weather</button>
    <div class="divider"><span>or</span></div>
    <button class="btn-secondary" onclick="getLocationWeather()"> Use my location</button>
    <button class="btn-ghost" onclick="toggleDarkMode()"> Toggle dark mode</button>
  </div>

  <div id="weather-card"></div>
</div>

  <script src="script.js"></script>
</body>

</html>
